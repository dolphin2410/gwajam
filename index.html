<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과잠 구매 수량 확인하기</title>
    <style>
        @import url(styles.css);
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title" id="title">과잠 및 후드집업 주문 확인</h1>
        <div class="forms">
            <div class="form-control">
                <label for="studid">학번</label>
                <br>
                <input type="text" placeholder="202x-xxxxx" id="studid" name="studid">
            </div>
            <br>
            <div class="form-control">
                <label for="pwd">암구호</label>
                <br>
                <input type="text" placeholder="우리들의 건배사?" id="pwd" name="pwd">
            </div>
            <br>
            <button id="submitbtn">확인하기</button>
        </div>
        <h2 class="subtitle" id="jackettitle">과잠</h2>
        <div class="centered">
            <table id="jackettable">

            </table>
        </div>
        <h2 class="subtitle" id="hoodietitle">후드집업</h2>
        <div class="centered">
            <table id="hoodietable">

            </table>
        </div>
        <p class="head-tooltip">개인정보 보호를 위해 타인 정보 열람 및 사이트 외부 반출을 금지합니다.</p>
        <br/><br/><br/>
        <p class="footer">Made by <b>2026 라온 과준위</b> with ❤️</p>
        <br><br>
        <div class="centered bapcontainer">
            <button class="bapsajuki" id="bapsajuki">❤️ 과준위 밥 사주기 ❤️</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
