<!DOCTYPE html>

        <br/><br/><br/>
        <p class="footer">Made by <b>2026 라온 반운위</b> with ❤️</p>
        <br><br>
        <div class="centered bapcontainer">
            <button class="bapsajuki" id="bapsajuki">❤️ 반운위 밥 사주기 ❤️</button>
